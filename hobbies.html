<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Хобби &mdash; Фёдор</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body data-page="hobbies">
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">Фёдор Баев</a>

      <input type="checkbox" id="burger-toggle" class="burger-checkbox">

      <label for="burger-toggle" class="burger-btn" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <nav>
        <a href="index.html">Главная</a>
        <a href="about.html">Обо мне</a>
        <a href="hobbies.html" class="active">Хобби</a>
        <a href="contacts.html">Контакты</a>
        <a href="skills.html">Навыки</a>
        <a href="tools.html">Инструменты</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <h1 class="myhobby">Мои хобби</h1>
    <section class="cards-filters" aria-label="Фильтры хобби">
      <div class="cards-filters__row">
        <label class="cards-filters__field">
          <span>Поиск</span>
          <input id="hobby-search" type="search" placeholder="Например: музыка, Arduino..." autocomplete="off">
        </label>
        <label class="cards-filters__field">
          <span>Технология</span>
          <select id="hobby-tech">
            <option value="">Все</option>
          </select>
        </label>
      </div>
      <p class="cards-filters__meta" id="hobby-meta"></p>
    </section>

    <div class="cards-grid" id="hobby-cards"></div>
  </main>

  <footer>
    <p>&copy; 2026 Фёдор Баен. Все права защищены.</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
